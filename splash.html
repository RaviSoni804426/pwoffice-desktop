<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PW Office - Loading</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.5s ease-in-out;
      padding: 2rem;
      max-width: 500px;
    }
    .logo-wrapper {
      margin-bottom: 1.5rem;
      display: inline-block;
      position: relative;
    }
    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.4));
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .spinner-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .status-text {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrapper">
      <img src="../pwoffice-project/pwoffice-webapp/public/images/pw-logo.png" alt="PW Office Logo" class="logo" id="logoImg">
    </div>
    <h1>PW Office</h1>
    <p>Connecting to workspace & document servers...</p>
    <div class="spinner-container">
      <div class="spinner"></div>
    </div>
    <div class="status-text" id="statusMsg">Initializing desktop session...</div>
  </div>
  <script>
    // Fallback if image path relative resolves differently
    const logoEl = document.getElementById('logoImg');
    logoEl.onerror = () => {
      logoEl.style.display = 'none';
    };
  </script>
</body>
</html>
