name: Build PW Office Desktop Installers

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Windows Installer
        run: npx electron-builder --win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwoffice-windows-installer
          path: dist/*.exe

  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build macOS Package
        run: npx electron-builder --mac

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwoffice-mac-installer
          path: dist/*.dmg

  build-linux:
    name: Build Linux (.AppImage & .deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools icnsutils graphicsmagick

      - name: Install Dependencies
        run: npm install

      - name: Build Linux Packages
        run: npx electron-builder --linux

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pwoffice-linux-installers
          path: |
            dist/*.AppImage
            dist/*.deb
