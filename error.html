<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PW Office - Connection Error</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.4s ease-out;
    }
    .icon-container {
      width: 64px;
      height: 64px;
      background: rgba(239, 68, 68, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      color: #ef4444;
    }
    .icon-container svg {
      width: 32px;
      height: 32px;
    }
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 1.75rem;
    }
    .retry-btn {
      background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%);
      color: #ffffff;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .retry-btn:hover {
      background: linear-gradient(135deg, #0369a1 0%, #1d4ed8 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }
    .retry-btn:active {
      transform: translateY(0);
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #64748b;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    <h2>Connection Failed</h2>
    <p>Could not connect to PW Office. Please make sure the server is running.</p>
    <button class="retry-btn" id="retryBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
      Retry Connection
    </button>
    <div class="hint">Ensure Docker / server container is running on your machine.</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    document.getElementById('retryBtn').addEventListener('click', () => {
      const btn = document.getElementById('retryBtn');
      btn.innerText = 'Connecting...';
      btn.disabled = true;
      ipcRenderer.send('retry-connection');
    });
  </script>
</body>
</html>
